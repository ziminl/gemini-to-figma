<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      padding: 20px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #111;
    }
    p {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    textarea {
      width: 100%;
      height: 320px;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      resize: none;
      background-color: #fff;
      outline: none;
    }
    textarea:focus {
      border-color: #18A0FB;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0d8de3;
    }
    button:active {
      background-color: #0a7bc9;
    }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <h2>Gemini 디자인 변환기</h2>
  <p>Gemini가 생성한 <b>JSON 데이터</b>를 아래에 붙여넣고 버튼을 누르세요. 피그마 레이어로 자동 변환됩니다.</p>
  
  <textarea id="jsonInput" placeholder='{ "sections": [...] }'></textarea>
  
  <button id="renderBtn">피그마 레이어로 변환하기</button>
  
  <div class="footer">데이터 형식이 올바르면 즉시 생성됩니다.</div>

  <script>
    document.getElementById('renderBtn').onclick = () => {
      const input = document.getElementById('jsonInput').value;
      try {
        // JSON 형식이 맞는지 간단히 체크
        const data = JSON.parse(input);
        
        // code.js로 데이터 전송
        parent.postMessage({ 
          pluginMessage: { 
            type: 'render-design', 
            data: data 
          } 
        }, '*');
      } catch (err) {
        alert("JSON 형식이 올바르지 않습니다. 다시 확인해 주세요!\n(에러: " + err.message + ")");
      }
    };

    // 완료 메시지 수신 (선택 사항)
    window.onmessage = (event) => {
      if (event.data.pluginMessage.type === 'complete') {
        document.getElementById('jsonInput').value = ""; // 입력창 비우기
      }
    };
  </script>
</body>
</html>
